<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <section class="container">
    
    <p id="one">Your Result</p>
    
    <div class="score">
      <h1>76</h1>
      <p id="two">of 100</p>
    </div>
   
  
    <h3>Great</h3>
    <p id="three">
      You scored higher than 65% of the people who have taken these tests.
    </p>
  </section>
  
  <section class="summary">
    <h4>Summary</h4>
    
    <div class="reaction">
      <img src="/assets/images/icon-reaction.svg" alt="icon">
      <p id="category">Reaction</p>
      <p id="score">80 / 100</p>
    </div>

    <div class="memory">
      <img src="/assets/images/icon-memory.svg" alt="icon">
      <p id="category">Memory</p>
      <p id="score">92 / 100</p>
    </div>


    <div class="verbal">
      <img src="/assets/images/icon-verbal.svg" alt="icon">
      <p id="category">Verbal</p>
      <p id="score">61 / 100</p>
    </div>

    <div class="visual">
      <img src="/assets/images/icon-visual.svg" alt="icon">
      <p id="category">Visual
      <p id="score">72 / 100</p>

    </div>

  
    <button>
      Continue
    </button>

  </section>
<br>
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Tanell Fortney</a>.
  </div>
</body>
</html>
